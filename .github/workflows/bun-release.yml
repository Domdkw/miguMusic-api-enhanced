name: Build and Release Bun Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux x64
        run: |
          bun build src/adapters/bun.ts --compile --minify --target=bun-linux-x64 --outfile dist-bun/migu-api-server-linux-x64
          chmod +x dist-bun/migu-api-server-linux-x64

      - name: Build Linux ARM64
        run: |
          bun build src/adapters/bun.ts --compile --minify --target=bun-linux-arm64 --outfile dist-bun/migu-api-server-linux-arm64
          chmod +x dist-bun/migu-api-server-linux-arm64

      - name: Build Windows x64
        run: bun build src/adapters/bun.ts --compile --minify --target=bun-windows-x64 --outfile dist-bun/migu-api-server-windows-x64.exe

      - name: Create archives
        run: |
          cd dist-bun
          tar -czvf migu-api-server-linux-x64.tar.gz migu-api-server-linux-x64
          tar -czvf migu-api-server-linux-arm64.tar.gz migu-api-server-linux-arm64
          zip migu-api-server-windows-x64.zip migu-api-server-windows-x64.exe

      - name: Generate checksums
        run: |
          cd dist-bun
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bun-executables
          path: |
            dist-bun/*.tar.gz
            dist-bun/*.zip
            dist-bun/checksums.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: bun-executables
          path: dist-bun

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Migu API Enhanced - Bun Executables
                        
            See `checksums.txt` for SHA256 checksums of all files.
          files: |
            dist-bun/*.tar.gz
            dist-bun/*.zip
            dist-bun/checksums.txt
          draft: false
          prerelease: false