<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 红色背景 -->
  <rect width="64" height="64" rx="12" fill="#dc2626"/>

  <!-- 耳机头梁（顶部弧形） -->
  <path d="M12 36 V30 C12 18, 24 12, 32 12 C40 12, 52 18, 52 30 V36"
        fill="none"
        stroke="#ffffff"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- 左侧耳罩 -->
  <rect x="7" y="32" width="11" height="22" rx="3" fill="#ffffff"/>

  <!-- 右侧耳罩 -->
  <rect x="46" y="32" width="11" height="22" rx="3" fill="#ffffff"/>

  <!-- 耳机内部中央的字母 M -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="900"
        fill="#ffffff">M</text>
</svg>
